<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Updatarr</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0d0f0e;
    --surface:   #131614;
    --surface2:  #1a1d1b;
    --border:    #2a2e2c;
    --accent:    #00e5a0;
    --accent2:   #00b87a;
    --warn:      #f5a623;
    --danger:    #e84040;
    --muted:     #4a5450;
    --text:      #d4dbd8;
    --text-dim:  #7a908a;
    --mono:      'JetBrains Mono', monospace;
    --sans:      'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: var(--sans);
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.5px;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-bracket { color: var(--muted); font-weight: 300; }

  .header-meta {
    display: flex;
    align-items: center;
    gap: 20px;
    color: var(--text-dim);
    font-size: 11px;
  }

  .next-run {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .pulse {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  /* ── Layout ── */
  .layout {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 0;
    height: calc(100vh - 57px);
  }

  .main-panel {
    overflow-y: auto;
    padding: 24px 28px;
    border-right: 1px solid var(--border);
  }

  .side-panel {
    overflow-y: auto;
    padding: 24px 20px;
    background: var(--surface);
  }

  /* ── Section headers ── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .section-title {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
  .btn.primary:hover { background: var(--accent2); border-color: var(--accent2); }
  .btn.danger { border-color: var(--danger); color: var(--danger); }
  .btn.danger:hover { background: var(--danger); color: #fff; }
  .btn.warn { border-color: var(--warn); color: var(--warn); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .btn-icon { font-size: 14px; line-height: 1; }

  /* ── Filter bar ── */
  .filter-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
  }

  .filter-btn {
    font-family: var(--mono);
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 2px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.15s;
  }

  .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,229,160,0.07); }

  /* ── Container table ── */
  .container-table {
    width: 100%;
    border-collapse: collapse;
  }

  .container-table th {
    text-align: left;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    font-weight: 500;
  }

  .container-row {
    border-bottom: 1px solid rgba(42,46,44,0.5);
    transition: background 0.1s;
    cursor: pointer;
  }

  .container-row:hover { background: var(--surface2); }
  .container-row.selected { background: rgba(0,229,160,0.05); }

  .container-row td {
    padding: 10px 10px;
    vertical-align: middle;
  }

  .container-name {
    font-weight: 500;
    font-size: 12px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .monitor-toggle {
    width: 14px; height: 14px;
    accent-color: var(--accent);
    cursor: pointer;
    flex-shrink: 0;
  }

  /* ── Status badges ── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 2px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .badge.running    { background: rgba(0,229,160,0.12); color: var(--accent); border: 1px solid rgba(0,229,160,0.25); }
  .badge.exited     { background: rgba(232,64,64,0.12); color: var(--danger); border: 1px solid rgba(232,64,64,0.25); }
  .badge.healthy    { background: rgba(0,229,160,0.12); color: var(--accent); border: 1px solid rgba(0,229,160,0.25); }
  .badge.unhealthy  { background: rgba(232,64,64,0.12); color: var(--danger); border: 1px solid rgba(232,64,64,0.25); }
  .badge.held       { background: rgba(245,166,35,0.12); color: var(--warn); border: 1px solid rgba(245,166,35,0.25); }
  .badge.starting   { background: rgba(245,166,35,0.08); color: var(--warn); border: 1px solid rgba(245,166,35,0.2); }
  .badge.paused     { background: rgba(122,144,138,0.12); color: var(--text-dim); border: 1px solid var(--border); }
  .badge.stack      { background: rgba(0,184,122,0.07); color: var(--accent2); border: 1px solid rgba(0,184,122,0.2); font-size: 9px; letter-spacing: 1px; }
  .badge.standalone { background: rgba(122,144,138,0.07); color: var(--muted); border: 1px solid var(--border); font-size: 9px; letter-spacing: 1px; }

  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: currentColor;
  }

  /* ── Image cell ── */
  .image-cell {
    color: var(--text-dim);
    font-size: 11px;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── Row actions ── */
  .row-actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .container-row:hover .row-actions,
  .container-row.selected .row-actions { opacity: 1; }

  .icon-btn {
    font-size: 13px;
    padding: 3px 6px;
    background: none;
    border: 1px solid transparent;
    border-radius: 3px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--mono);
  }

  .icon-btn:hover { border-color: var(--border); color: var(--text); }
  .icon-btn.danger:hover { border-color: var(--danger); color: var(--danger); }

  /* ── Side panel ── */
  .detail-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px;
    margin-bottom: 16px;
  }

  .detail-card h3 {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 13px;
    margin-bottom: 12px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .detail-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 5px 0;
    border-bottom: 1px solid rgba(42,46,44,0.5);
    font-size: 11px;
    gap: 8px;
  }

  .detail-row:last-child { border-bottom: none; }

  .detail-label { color: var(--text-dim); flex-shrink: 0; }
  .detail-value { color: var(--text); text-align: right; word-break: break-all; }

  /* ── Backup list ── */
  .backup-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 0;
    border-bottom: 1px solid rgba(42,46,44,0.5);
    font-size: 11px;
    gap: 8px;
  }

  .backup-item:last-child { border-bottom: none; }

  .backup-tag { color: var(--accent2); font-size: 10px; }

  /* ── Event log ── */
  .event-item {
    padding: 8px 0;
    border-bottom: 1px solid rgba(42,46,44,0.5);
    font-size: 11px;
  }

  .event-item:last-child { border-bottom: none; }

  .event-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 3px;
  }

  .event-container { font-weight: 500; color: var(--text); }
  .event-time { color: var(--text-dim); font-size: 10px; }

  .event-detail {
    color: var(--text-dim);
    font-size: 10px;
    margin-top: 2px;
    line-height: 1.5;
  }

  /* ── Hold warning ── */
  .hold-banner {
    background: rgba(245,166,35,0.08);
    border: 1px solid rgba(245,166,35,0.3);
    border-radius: 3px;
    padding: 10px 12px;
    margin-bottom: 12px;
    font-size: 11px;
    color: var(--warn);
    line-height: 1.5;
  }

  /* ── Toast ── */
  .toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9998;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .toast {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    padding: 10px 16px;
    border-radius: 3px;
    font-size: 12px;
    max-width: 320px;
    animation: slideIn 0.2s ease;
  }

  .toast.error { border-left-color: var(--danger); }
  .toast.warn  { border-left-color: var(--warn); }

  @keyframes slideIn {
    from { transform: translateX(20px); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
  }

  /* ── Loading ── */
  .loading-row td {
    padding: 40px;
    text-align: center;
    color: var(--text-dim);
  }

  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    color: var(--text-dim);
    padding: 32px;
    font-size: 12px;
  }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }

  .tab {
    font-family: var(--mono);
    font-size: 11px;
    padding: 8px 14px;
    border: none;
    background: none;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }

  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Scrollbars ── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; height: auto; }
    .side-panel { border-top: 1px solid var(--border); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-bracket">[</span>
    updatarr
    <span class="logo-bracket">]</span>
  </div>
  <div class="header-meta">
    <div class="next-run">
      <div class="pulse"></div>
      <span id="next-run-label">loading schedule...</span>
    </div>
    <button class="btn" onclick="refreshAll()">
      <span class="btn-icon">↻</span> Refresh
    </button>
  </div>
</header>

<div class="layout">

  <!-- ── Main Panel ── -->
  <div class="main-panel">
    <div class="section-header">
      <span class="section-title">Containers</span>
      <span id="container-count" style="color:var(--text-dim);font-size:11px;"></span>
    </div>

    <div class="toolbar">
      <button class="btn primary" onclick="updateAll()">
        <span class="btn-icon">⬆</span> Update All Monitored
      </button>
      <button class="btn" onclick="backupAll()">
        <span class="btn-icon">◎</span> Backup All Monitored
      </button>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('monitored', this)">Monitored</button>
      <button class="filter-btn" onclick="setFilter('held', this)">Held</button>
      <button class="filter-btn" onclick="setFilter('unhealthy', this)">Unhealthy</button>
    </div>

    <table class="container-table">
      <thead>
        <tr>
          <th style="width:24px"></th>
          <th>Container</th>
          <th>Status</th>
          <th>Health</th>
          <th class="image-cell">Image</th>
          <th style="width:120px"></th>
        </tr>
      </thead>
      <tbody id="container-tbody">
        <tr class="loading-row"><td colspan="6"><span class="spinner"></span>Loading containers...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- ── Side Panel ── -->
  <div class="side-panel">

    <div class="tabs">
      <button class="tab active" onclick="switchTab('detail', this)">Detail</button>
      <button class="tab" onclick="switchTab('events', this)">Events</button>
    </div>

    <!-- Detail tab -->
    <div class="tab-panel active" id="tab-detail">
      <div id="detail-content">
        <div class="empty-state">
          Select a container to view details
        </div>
      </div>
    </div>

    <!-- Events tab -->
    <div class="tab-panel" id="tab-events">
      <div id="events-content">
        <div class="empty-state"><span class="spinner"></span>Loading events...</div>
      </div>
    </div>

  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toasts"></div>

<script>
// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────
let containers = [];
let selectedContainer = null;
let currentFilter = 'all';

// ─────────────────────────────────────────────
// API helpers
// ─────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
  return r.json();
}

// ─────────────────────────────────────────────
// Toast
// ─────────────────────────────────────────────
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

// ─────────────────────────────────────────────
// Fetch + render containers
// ─────────────────────────────────────────────
async function loadContainers() {
  try {
    containers = await api('GET', '/api/containers');
    renderContainers();
    updateCount();
  } catch(e) {
    toast('Failed to load containers: ' + e.message, 'error');
  }
}

function updateCount() {
  const mon = containers.filter(c => c.monitored).length;
  const held = containers.filter(c => c.held).length;
  document.getElementById('container-count').textContent =
    `${containers.length} total · ${mon} monitored${held ? ` · ${held} held` : ''}`;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderContainers();
}

function filteredContainers() {
  switch (currentFilter) {
    case 'monitored': return containers.filter(c => c.monitored);
    case 'held':      return containers.filter(c => c.held);
    case 'unhealthy': return containers.filter(c => c.health === 'unhealthy' || c.status === 'exited');
    default:          return containers;
  }
}

function renderContainers() {
  const tbody = document.getElementById('container-tbody');
  const list = filteredContainers();

  if (!list.length) {
    tbody.innerHTML = `<tr class="loading-row"><td colspan="6"><div class="empty-state">No containers match this filter</div></td></tr>`;
    return;
  }

  tbody.innerHTML = list.map(c => {
    const isSelected = selectedContainer && selectedContainer.name === c.name;
    const statusBadge = badge(c.status);
    const healthBadge = c.health ? badge(c.health) : '';
    const heldBadge = c.held ? `<span class="badge held"><span class="dot"></span>HELD</span>` : '';

    return `
    <tr class="container-row ${isSelected ? 'selected' : ''}" onclick="selectContainer('${c.name}')">
      <td>
        <input type="checkbox" class="monitor-toggle"
          ${c.monitored ? 'checked' : ''}
          title="${c.monitored ? 'Monitored — click to disable' : 'Not monitored — click to enable'}"
          onclick="event.stopPropagation(); toggleMonitor('${c.name}', this.checked)">
      </td>
      <td>
        <div class="container-name">
          ${c.name}
          ${heldBadge}
        </div>
        <div style="margin-top:3px">
          ${c.compose_project
            ? `<span class="badge stack">${c.compose_project}</span>`
            : `<span class="badge standalone">standalone</span>`}
        </div>
      </td>
      <td>${statusBadge}</td>
      <td>${healthBadge}</td>
      <td class="image-cell" title="${c.image}">${c.image}</td>
      <td>
        <div class="row-actions">
          <button class="icon-btn" title="Update" onclick="event.stopPropagation(); updateOne('${c.name}')">⬆</button>
          <button class="icon-btn" title="Backup" onclick="event.stopPropagation(); backupOne('${c.name}')">◎</button>
          ${c.held ? `<button class="icon-btn warn" title="Release hold" onclick="event.stopPropagation(); releaseHold('${c.name}')">✓</button>` : ''}
        </div>
      </td>
    </tr>`;
  }).join('');
}

function badge(status) {
  const icons = { running: '●', exited: '●', healthy: '●', unhealthy: '●', starting: '●', paused: '●' };
  const dot = `<span class="dot"></span>`;
  return `<span class="badge ${status}">${dot}${status.toUpperCase()}</span>`;
}

// ─────────────────────────────────────────────
// Container detail
// ─────────────────────────────────────────────
async function selectContainer(name) {
  selectedContainer = containers.find(c => c.name === name);
  renderContainers();
  await renderDetail();
}

async function renderDetail() {
  const c = selectedContainer;
  if (!c) return;

  const backups = await api('GET', `/api/backups/${c.name}`).catch(() => []);

  const holdSection = c.held ? `
    <div class="hold-banner">
      ⚠ UPDATE HOLD ACTIVE<br>
      <span style="color:var(--text-dim)">${c.hold_reason || 'No reason provided'}</span>
    </div>
    <button class="btn warn" style="width:100%;margin-bottom:12px" onclick="releaseHold('${c.name}')">
      Release Hold
    </button>` : '';

  const backupList = backups.length ? backups.slice(0, 5).map(b => `
    <div class="backup-item">
      <div>
        <div class="backup-tag">${b.tag}</div>
        <div style="color:var(--text-dim);font-size:10px;margin-top:2px">${b.files ? b.files.length + ' file(s)' : ''}</div>
      </div>
      <button class="btn" style="padding:4px 10px;font-size:10px" onclick="restoreBackup('${c.name}','${b.tag}')">
        Restore
      </button>
    </div>`).join('') : '<div style="color:var(--text-dim);font-size:11px;padding:8px 0">No backups yet</div>';

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-card">
      <h3>${c.name}</h3>
      ${holdSection}
      <div class="detail-row">
        <span class="detail-label">Stack</span>
        <span class="detail-value">
          ${c.compose_project
            ? `<span class="badge stack">${c.compose_project}</span>`
            : `<span class="badge standalone">standalone</span>`}
        </span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Status</span>
        <span class="detail-value">${badge(c.status)}</span>
      </div>
      ${c.health ? `<div class="detail-row">
        <span class="detail-label">Health</span>
        <span class="detail-value">${badge(c.health)}</span>
      </div>` : ''}
      <div class="detail-row">
        <span class="detail-label">Monitored</span>
        <span class="detail-value" style="color:${c.monitored ? 'var(--accent)' : 'var(--text-dim)'}">${c.monitored ? 'YES' : 'NO'}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Health timeout</span>
        <span class="detail-value">${c.health_timeout}s</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Image</span>
        <span class="detail-value" style="font-size:10px">${c.image}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Image ID</span>
        <span class="detail-value" style="font-size:10px">${c.image_id ? c.image_id.substring(7,19) : '—'}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Ver. source</span>
        <span class="detail-value" style="color:var(--text-dim);font-size:10px">
          ${c.version_source === 'dockerhub' ? '🐳 Docker Hub' :
            c.version_source === 'github_releases' ? '⬡ GitHub releases' :
            c.version_source === 'github_tags' ? '⬡ GitHub tags' :
            c.version_source === 'unsupported' ? '— unsupported' : '—'}
        </span>
      </div>
      <div class="detail-row" style="align-items:flex-start">
        <span class="detail-label" style="padding-top:4px">GitHub repo</span>
        <span class="detail-value" style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
          <span style="display:flex;gap:4px;align-items:center">
            <input id="repo-input" type="text"
              value="${c.github_repo || ''}"
              placeholder="${c.github_suggestion || 'owner/repo'}"
              style="background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:10px;padding:3px 6px;border-radius:2px;width:140px"
              onkeydown="if(event.key==='Enter') saveRepo('${c.name}')">
            <button class="icon-btn" title="Save and use GitHub" onclick="saveRepo('${c.name}')">✓</button>
            ${c.github_repo ? `<button class="icon-btn danger" title="Clear GitHub repo (revert to Docker Hub)" onclick="clearRepo('${c.name}')">✕</button>` : ''}
          </span>
          ${!c.github_repo && c.github_suggestion
            ? `<span style="color:var(--text-dim);font-size:9px">suggestion: ${c.github_suggestion}</span>`
            : ''}
          ${c.github_repo
            ? `<span style="color:var(--accent2);font-size:9px">using GitHub ↑</span>`
            : `<span style="color:var(--text-dim);font-size:9px">optional — overrides Docker Hub</span>`}
        </span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Current ver.</span>
        <span class="detail-value" style="color:var(--accent2);font-size:11px">${c.current_version || '—'}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Latest ver.</span>
        <span class="detail-value" id="version-check-result">
          ${c.latest_version
            ? `<span style="font-size:11px;color:${c.update_available ? 'var(--warn)' : 'var(--accent)'}">${c.latest_version}</span>
               <button class="btn" style="padding:2px 7px;font-size:9px;margin-left:4px" onclick="checkVersion('${c.name}')">↻</button>`
            : `<button class="btn" style="padding:3px 10px;font-size:10px" onclick="checkVersion('${c.name}')">Check</button>`
          }
        </span>
      </div>

      ${c.update_available ? `
      <div class="detail-row">
        <span class="detail-label">Status</span>
        <span class="detail-value"><span class="badge held"><span class="dot"></span>UPDATE AVAILABLE</span></span>
      </div>` : (c.latest_version && !c.update_available ? `
      <div class="detail-row">
        <span class="detail-label">Status</span>
        <span class="detail-value"><span class="badge running"><span class="dot"></span>UP TO DATE</span></span>
      </div>` : '')}
    </div>

    <div class="detail-card">
      <h3>Actions</h3>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn primary" onclick="updateOne('${c.name}')">
          <span class="btn-icon">⬆</span> Update Container
        </button>
        <button class="btn" onclick="backupOne('${c.name}')">
          <span class="btn-icon">◎</span> Manual Backup
        </button>
      </div>
    </div>

    <div class="detail-card">
      <h3>Backup Settings</h3>
      <div class="detail-row" style="align-items:center">
        <span class="detail-label">Retention</span>
        <span class="detail-value" style="display:flex;gap:4px;align-items:center">
          <input id="retention-input" type="number" min="1" max="30"
            value="${c.backup_retention || 3}"
            style="background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:10px;padding:3px 6px;border-radius:2px;width:50px">
          <span style="color:var(--text-dim);font-size:10px">backups kept</span>
          <button class="icon-btn" title="Save" onclick="saveBackupSettings('${c.name}')">✓</button>
        </span>
      </div>
      <div class="detail-row" style="align-items:flex-start">
        <span class="detail-label" style="padding-top:4px">Exclude volumes</span>
        <span class="detail-value" style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
          <input id="exclusions-input" type="text"
            value="${c.excluded_volumes || ''}"
            placeholder="e.g. -cache,-logs"
            style="background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:10px;padding:3px 6px;border-radius:2px;width:160px"
            onkeydown="if(event.key==='Enter') saveBackupSettings('${c.name}')">
          <span style="color:var(--text-dim);font-size:9px">comma-separated substrings • cache/transcode excluded by default</span>
        </span>
      </div>
    </div>

    <div class="detail-card">
      <h3>Backups</h3>
      ${backupList}
    </div>
  `;
}

// ─────────────────────────────────────────────
// Version check
// ─────────────────────────────────────────────
async function checkVersion(name) {
  const el = document.getElementById('version-check-result');
  if (el) el.innerHTML = '<span class="spinner"></span>';
  try {
    const r = await api('GET', `/api/check-version/${name}`);
    if (r.status === 'unsupported') {
      if (el) el.innerHTML = `<span style="color:var(--text-dim);font-size:10px">Not supported</span>`;
      return;
    }
    if (r.status === 'error') {
      if (el) el.innerHTML = `<span style="color:var(--danger);font-size:10px">⚠ ${r.detail}</span>`;
      return;
    }
    // Update the local container cache so the detail panel re-renders correctly
    const c = containers.find(c => c.name === name);
    if (c) {
      c.latest_version = r.latest_version;
      c.current_version = r.current_version;
      c.update_available = r.update_available;
      c.version_source = r.source || null;
      c.github_suggestion = r.github_suggestion || null;
    }
    if (selectedContainer?.name === name) {
      selectedContainer = c;
      await renderDetail();
    }
  } catch(e) {
    if (el) el.innerHTML = `<span style="color:var(--danger);font-size:10px">Failed</span>`;
  }
}

// ─────────────────────────────────────────────
// Repo save
// ─────────────────────────────────────────────
async function clearRepo(name) {
  try {
    await api('POST', `/api/containers/${name}/config`, {
      github_repo: '',
      github_endpoint: null
    });
    const c = containers.find(c => c.name === name);
    if (c) {
      c.github_repo = null;
      c.github_endpoint = null;
      c.latest_version = null;
      c.update_available = null;
      c.version_source = null;
    }
    toast(`GitHub repo cleared for ${name} — will use Docker Hub`);
    if (selectedContainer?.name === name) {
      selectedContainer = c;
      await renderDetail();
    }
  } catch(e) {
    toast('Failed to clear repo: ' + e.message, 'error');
  }
}

async function saveBackupSettings(name) {
  const retention = parseInt(document.getElementById('retention-input')?.value || '3');
  const exclusions = document.getElementById('exclusions-input')?.value.trim() || '';
  try {
    await api('POST', `/api/containers/${name}/config`, {
      backup_retention: retention,
      excluded_volumes: exclusions || null,
    });
    const c = containers.find(c => c.name === name);
    if (c) {
      c.backup_retention = retention;
      c.excluded_volumes = exclusions || null;
    }
    toast(`Backup settings saved for ${name}`);
  } catch(e) {
    toast('Failed to save backup settings: ' + e.message, 'error');
  }
}

async function saveRepo(name) {
  const input = document.getElementById('repo-input');
  if (!input) return;
  const repo = input.value.trim();
  if (!repo) return;
  try {
    await api('POST', `/api/containers/${name}/config`, {
      github_repo: repo,
      github_endpoint: null  // reset endpoint so it re-probes
    });
    const c = containers.find(c => c.name === name);
    if (c) {
      c.github_repo = repo;
      c.github_endpoint = null;
      c.latest_version = null;
      c.update_available = null;
      c.version_source = null;
    }
    toast(`Repo saved for ${name} — click Check to fetch version`);
    if (selectedContainer?.name === name) {
      selectedContainer = c;
      await renderDetail();
    }
  } catch(e) {
    toast('Failed to save repo: ' + e.message, 'error');
  }
}

// ─────────────────────────────────────────────
// Actions
// ─────────────────────────────────────────────
async function toggleMonitor(name, checked) {
  try {
    await api('POST', `/api/containers/${name}/config`, { monitored: checked });
    const c = containers.find(c => c.name === name);
    if (c) c.monitored = checked;
    toast(`${name} ${checked ? 'added to' : 'removed from'} monitoring`);
    updateCount();
    renderContainers();
    if (selectedContainer?.name === name) {
      selectedContainer.monitored = checked;
      await renderDetail();
    }
  } catch(e) { toast('Failed to update config: ' + e.message, 'error'); }
}

async function updateOne(name) {
  toast(`Starting update for ${name}...`);
  try {
    const r = await api('POST', `/api/update/${name}`);
    const t = r.status === 'success' ? 'info' : r.status === 'rolled_back' ? 'error' : 'warn';
    toast(`${name}: ${r.status} — ${r.detail || r.reason || ''}`, t);
    await loadContainers();
    await loadEvents();
    if (selectedContainer?.name === name) await renderDetail();
  } catch(e) { toast('Update failed: ' + e.message, 'error'); }
}

async function updateAll() {
  toast('Running update for all monitored containers...');
  try {
    const results = await api('POST', '/api/update-all');
    const failed = results.filter(r => r.status === 'rolled_back' || r.status === 'failed');
    if (failed.length) {
      toast(`${failed.length} container(s) failed/rolled back`, 'error');
    } else {
      toast(`All updates complete (${results.length} containers)`);
    }
    await loadContainers();
    await loadEvents();
    if (selectedContainer) await renderDetail();
  } catch(e) { toast('Update all failed: ' + e.message, 'error'); }
}

async function backupOne(name) {
  toast(`Backing up ${name}...`);
  try {
    const r = await api('POST', `/api/backup/${name}`);
    toast(`${name} backed up (tag: ${r.tag || 'unknown'})`);
    if (selectedContainer?.name === name) await renderDetail();
  } catch(e) { toast('Backup failed: ' + e.message, 'error'); }
}

async function backupAll() {
  const monitored = containers.filter(c => c.monitored);
  if (!monitored.length) { toast('No monitored containers', 'warn'); return; }
  toast(`Backing up ${monitored.length} containers...`);
  for (const c of monitored) {
    try {
      await api('POST', `/api/backup/${c.name}`);
    } catch(e) { toast(`Backup failed for ${c.name}`, 'error'); }
  }
  toast('Backup run complete');
}

async function restoreBackup(name, tag) {
  if (!confirm(`Restore ${name} from backup ${tag}?\n\nThe container should be stopped first.`)) return;
  toast(`Restoring ${name} from ${tag}...`);
  try {
    const r = await api('POST', `/api/restore/${name}`, { tag });
    toast(`${name} restored: ${r.status}`, r.status === 'success' ? 'info' : 'error');
    await loadContainers();
  } catch(e) { toast('Restore failed: ' + e.message, 'error'); }
}

async function releaseHold(name) {
  try {
    await api('POST', `/api/containers/${name}/release-hold`);
    toast(`Hold released for ${name}`);
    await loadContainers();
    if (selectedContainer?.name === name) {
      selectedContainer = containers.find(c => c.name === name);
      await renderDetail();
    }
  } catch(e) { toast('Failed to release hold: ' + e.message, 'error'); }
}

// ─────────────────────────────────────────────
// Events
// ─────────────────────────────────────────────
async function loadEvents() {
  try {
    const events = await api('GET', '/api/events?limit=30');
    const el = document.getElementById('events-content');

    if (!events.length) {
      el.innerHTML = '<div class="empty-state">No events yet</div>';
      return;
    }

    const statusColor = { success: 'var(--accent)', failed: 'var(--danger)', rolled_back: 'var(--danger)', pending: 'var(--warn)', skipped: 'var(--text-dim)' };

    el.innerHTML = events.map(e => `
      <div class="event-item">
        <div class="event-header">
          <span class="event-container">${e.container}</span>
          <span class="badge" style="color:${statusColor[e.status]||'var(--text-dim)'};background:transparent;border:none;padding:0;font-size:10px">${e.status.toUpperCase()}</span>
        </div>
        <div class="event-time">${e.started_at ? new Date(e.started_at).toLocaleString() : ''}</div>
        ${e.detail ? `<div class="event-detail">${e.detail}</div>` : ''}
        ${e.old_image && e.new_image && e.old_image !== e.new_image
          ? `<div class="event-detail" style="color:var(--text-dim)">${e.old_image} → ${e.new_image}</div>` : ''}
      </div>`).join('');
  } catch(e) {
    document.getElementById('events-content').innerHTML = '<div class="empty-state">Failed to load events</div>';
  }
}

// ─────────────────────────────────────────────
// Schedule
// ─────────────────────────────────────────────
async function loadSchedule() {
  try {
    const jobs = await api('GET', '/api/schedule');
    const job = jobs[0];
    if (job?.next_run) {
      const d = new Date(job.next_run);
      document.getElementById('next-run-label').textContent = `Next update: ${d.toLocaleString()}`;
    } else {
      document.getElementById('next-run-label').textContent = 'No schedule active';
    }
  } catch(e) {
    document.getElementById('next-run-label').textContent = 'Schedule unavailable';
  }
}

// ─────────────────────────────────────────────
// Tabs
// ─────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`tab-${name}`).classList.add('active');
  if (name === 'events') loadEvents();
}

// ─────────────────────────────────────────────
// Refresh
// ─────────────────────────────────────────────
async function refreshAll() {
  await loadContainers();
  await loadSchedule();
  if (selectedContainer) {
    selectedContainer = containers.find(c => c.name === selectedContainer.name);
    if (selectedContainer) await renderDetail();
  }
}

// ─────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────
(async () => {
  await Promise.all([loadContainers(), loadSchedule()]);
  // Auto-refresh every 30s
  setInterval(refreshAll, 30000);
})();
</script>
</body>
</html>
